name: Data Sync Cron Jobs

on:
  schedule:
    - cron: '0 2 * * *'
    - cron: '0 3 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      sync_type:
        description: 'Sync type to run'
        required: true
        default: 'both'
        type: choice
        options:
          - people
          - visas
          - interview_records
          - app98_mapping_audit
          - both
      batch_size:
        description: 'Connector batch size for interview_records manual sync'
        required: false
        default: '10'
      record_id_from:
        description: 'Optional Kintone record ID range start for interview_records'
        required: false
      record_id_to:
        description: 'Optional Kintone record ID range end for interview_records'
        required: false
      record_id_tail_size:
        description: 'Optional newest Kintone record ID window size for interview_records'
        required: false
      app98_mapping_apply:
        description: 'Apply App98 mapping audit fixes. Leave false for dry-run.'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      app98_mapping_slug:
        description: 'Optional tenant slug/COID to audit or fix only one tenant'
        required: false
      app98_mapping_slugs:
        description: 'Optional comma-separated tenant slugs/COIDs to audit or fix'
        required: false
      app98_mapping_limit:
        description: 'Optional audit candidate limit'
        required: false
      app98_mapping_max_apply:
        description: 'Maximum tenant configs to modify when apply=true'
        required: false
        default: '50'
      app98_mapping_require_external_users:
        description: 'Only audit/fix tenants with at least one active non-Funtoco user'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  sync-people:
    if: github.event_name == 'schedule' && github.event.schedule == '0 2 * * *' || github.event_name == 'workflow_dispatch' && (github.event.inputs.sync_type == 'people' || github.event.inputs.sync_type == 'both')
    runs-on: ubuntu-latest
    timeout-minutes: 360
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync People Data
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "🕐 Starting people sync at $(date)"
          pnpm dlx tsx@4.20.3 scripts/sync-by-type.ts --type people

  sync-visas:
    if: github.event_name == 'schedule' && github.event.schedule == '0 3 * * *' || github.event_name == 'workflow_dispatch' && (github.event.inputs.sync_type == 'visas' || github.event.inputs.sync_type == 'both')
    runs-on: ubuntu-latest
    timeout-minutes: 360
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync Visas Data
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "🕐 Starting visas sync at $(date)"
          pnpm dlx tsx@4.20.3 scripts/sync-by-type.ts --type visas

  sync-interview-records:
    if: github.event_name == 'schedule' && github.event.schedule == '0 19 * * *' || github.event_name == 'workflow_dispatch' && github.event.inputs.sync_type == 'interview_records'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync Interview Records
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size }}
          RECORD_ID_FROM: ${{ github.event.inputs.record_id_from }}
          RECORD_ID_TO: ${{ github.event.inputs.record_id_to }}
          RECORD_ID_TAIL_SIZE: ${{ github.event.inputs.record_id_tail_size }}
        run: |
          echo "🕐 Starting interview_records sync at $(date)"
          cmd=(pnpm dlx tsx@4.20.3 scripts/sync-by-type.ts --type interview_records)

          add_numeric_arg() {
            local input_name="$1"
            local input_value="$2"
            local arg_name="$3"

            if [ -z "$input_value" ]; then
              return 0
            fi

            if [[ ! "$input_value" =~ ^[0-9]+$ ]]; then
              echo "::error title=Invalid workflow input::${input_name} must be digits only"
              exit 1
            fi

            cmd+=("$arg_name" "$input_value")
          }

          if [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
            # 04:00 JST daily: small newest-record window, one connector at a time.
            cmd+=(--all-batches --limit 1 --record-id-tail-size 2000)
          else
            cmd+=(--all-batches)
            add_numeric_arg "batch_size" "${BATCH_SIZE:-}" "--limit"
            add_numeric_arg "record_id_from" "${RECORD_ID_FROM:-}" "--record-id-from"
            add_numeric_arg "record_id_to" "${RECORD_ID_TO:-}" "--record-id-to"
            add_numeric_arg "record_id_tail_size" "${RECORD_ID_TAIL_SIZE:-}" "--record-id-tail-size"
          fi
          "${cmd[@]}"

  app98-mapping-audit:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.sync_type == 'app98_mapping_audit'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit App98 mapping configuration
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APP98_MAPPING_APPLY: ${{ github.event.inputs.app98_mapping_apply }}
          APP98_MAPPING_SLUG: ${{ github.event.inputs.app98_mapping_slug }}
          APP98_MAPPING_SLUGS: ${{ github.event.inputs.app98_mapping_slugs }}
          APP98_MAPPING_LIMIT: ${{ github.event.inputs.app98_mapping_limit }}
          APP98_MAPPING_MAX_APPLY: ${{ github.event.inputs.app98_mapping_max_apply }}
          APP98_MAPPING_REQUIRE_EXTERNAL_USERS: ${{ github.event.inputs.app98_mapping_require_external_users }}
        run: |
          echo "🕐 Starting App98 mapping audit at $(date)"
          cmd=(pnpm dlx tsx@4.20.3 scripts/audit-app98-mappings.ts)

          if [ "$APP98_MAPPING_APPLY" = "true" ]; then
            cmd+=(--apply)
          fi

          if [ -n "$APP98_MAPPING_SLUG" ]; then
            if [[ ! "$APP98_MAPPING_SLUG" =~ ^[0-9]+$ ]]; then
              echo "::error title=Invalid workflow input::app98_mapping_slug must be digits only"
              exit 1
            fi
            cmd+=(--slug "$APP98_MAPPING_SLUG")
          fi

          if [ -n "$APP98_MAPPING_SLUGS" ]; then
            if [[ ! "$APP98_MAPPING_SLUGS" =~ ^[0-9,]+$ ]]; then
              echo "::error title=Invalid workflow input::app98_mapping_slugs must be comma-separated digits only"
              exit 1
            fi
            cmd+=(--slugs "$APP98_MAPPING_SLUGS")
          fi

          if [ -n "$APP98_MAPPING_LIMIT" ]; then
            if [[ ! "$APP98_MAPPING_LIMIT" =~ ^[0-9]+$ ]]; then
              echo "::error title=Invalid workflow input::app98_mapping_limit must be digits only"
              exit 1
            fi
            cmd+=(--limit "$APP98_MAPPING_LIMIT")
          fi

          if [ -n "$APP98_MAPPING_MAX_APPLY" ]; then
            if [[ ! "$APP98_MAPPING_MAX_APPLY" =~ ^[0-9]+$ ]]; then
              echo "::error title=Invalid workflow input::app98_mapping_max_apply must be digits only"
              exit 1
            fi
            cmd+=(--max-apply "$APP98_MAPPING_MAX_APPLY")
          fi

          if [ "$APP98_MAPPING_REQUIRE_EXTERNAL_USERS" = "true" ]; then
            cmd+=(--require-external-users)
          fi

          "${cmd[@]}"

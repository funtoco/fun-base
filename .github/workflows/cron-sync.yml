name: Data Sync Cron Jobs

on:
  # スケジュール実行
  schedule:
    # people: 毎日 2:00 UTC (日本時間 11:00)
    - cron: '0 2 * * *'
    # visas: 毎日 3:00 UTC (日本時間 12:00)  
    - cron: '0 3 * * *'
  
  # 手動実行
  workflow_dispatch:
    inputs:
      sync_type:
        description: 'Sync type to run'
        required: true
        default: 'both'
        type: choice
        options:
          - people
          - visas
          - both

jobs:
  sync-people:
    if: github.event_name == 'schedule' && github.event.schedule == '0 2 * * *' || github.event_name == 'workflow_dispatch' && (github.event.inputs.sync_type == 'people' || github.event.inputs.sync_type == 'both')
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6時間のタイムアウト
    
    steps:
      - name: Sync People Data
        run: |
          echo "🕐 Starting people sync at $(date)"

          cursor=0
          batch_size=10
          batch_no=1
          total_synced=0
          total_processed=0

          while true; do
            echo "➡️ People sync batch ${batch_no} (cursor=${cursor}, batchSize=${batch_size})"

            response=$(curl -s -w "\n%{http_code}" \
              -X GET \
              "${{ secrets.API_BASE_URL }}/api/cron/sync-by-type?type=people&secret=${{ secrets.CRON_SECRET }}&cursor=${cursor}&batchSize=${batch_size}")

            http_code=$(echo "$response" | tail -n1)
            body=$(echo "$response" | head -n -1)

            echo "Response status: $http_code"

            if [ "$http_code" -ne 200 ]; then
              echo "❌ People sync failed with status $http_code"
              echo "$body"
              exit 1
            fi

            batch_success=$(echo "$body" | jq -r '.success')
            if [ "$batch_success" != "true" ]; then
              echo "❌ People sync batch ${batch_no} completed with connector failures"
              echo "$body" | jq '.'
              exit 1
            fi

            batch_synced=$(echo "$body" | jq -r '.totalSynced')
            processed_count=$(echo "$body" | jq -r '.processedConnectorCount')
            has_more=$(echo "$body" | jq -r '.hasMore')
            next_cursor=$(echo "$body" | jq -r '.nextCursor // empty')

            total_synced=$((total_synced + batch_synced))
            total_processed=$((total_processed + processed_count))

            echo "✅ People batch ${batch_no} succeeded"
            echo "$body" | jq '{message, processedConnectorCount, totalConnectorCount, totalSynced, successCount, failedCount, hasMore, nextCursor}'

            if [ "$has_more" != "true" ]; then
              break
            fi

            cursor="$next_cursor"
            batch_no=$((batch_no + 1))
          done

          echo "🏁 People sync completed successfully"
          echo "Total processed connectors: ${total_processed}"
          echo "Total synced records: ${total_synced}"

  sync-visas:
    if: github.event_name == 'schedule' && github.event.schedule == '0 3 * * *' || github.event_name == 'workflow_dispatch' && (github.event.inputs.sync_type == 'visas' || github.event.inputs.sync_type == 'both')
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6時間のタイムアウト
    
    steps:
      - name: Sync Visas Data
        run: |
          echo "🕐 Starting visas sync at $(date)"

          cursor=0
          batch_size=10
          batch_no=1
          total_synced=0
          total_processed=0

          while true; do
            echo "➡️ Visas sync batch ${batch_no} (cursor=${cursor}, batchSize=${batch_size})"

            response=$(curl -s -w "\n%{http_code}" \
              -X GET \
              "${{ secrets.API_BASE_URL }}/api/cron/sync-by-type?type=visas&secret=${{ secrets.CRON_SECRET }}&cursor=${cursor}&batchSize=${batch_size}")

            http_code=$(echo "$response" | tail -n1)
            body=$(echo "$response" | head -n -1)

            echo "Response status: $http_code"

            if [ "$http_code" -ne 200 ]; then
              echo "❌ Visas sync failed with status $http_code"
              echo "$body"
              exit 1
            fi

            batch_success=$(echo "$body" | jq -r '.success')
            if [ "$batch_success" != "true" ]; then
              echo "❌ Visas sync batch ${batch_no} completed with connector failures"
              echo "$body" | jq '.'
              exit 1
            fi

            batch_synced=$(echo "$body" | jq -r '.totalSynced')
            processed_count=$(echo "$body" | jq -r '.processedConnectorCount')
            has_more=$(echo "$body" | jq -r '.hasMore')
            next_cursor=$(echo "$body" | jq -r '.nextCursor // empty')

            total_synced=$((total_synced + batch_synced))
            total_processed=$((total_processed + processed_count))

            echo "✅ Visas batch ${batch_no} succeeded"
            echo "$body" | jq '{message, processedConnectorCount, totalConnectorCount, totalSynced, successCount, failedCount, hasMore, nextCursor}'

            if [ "$has_more" != "true" ]; then
              break
            fi

            cursor="$next_cursor"
            batch_no=$((batch_no + 1))
          done

          echo "🏁 Visas sync completed successfully"
          echo "Total processed connectors: ${total_processed}"
          echo "Total synced records: ${total_synced}"

name: Data Sync Cron Jobs

on:
  schedule:
    - cron: '0 2 * * *'
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      sync_type:
        description: 'Sync type to run'
        required: true
        default: 'both'
        type: choice
        options:
          - people
          - visas
          - interview_records
          - both
      batch_size:
        description: 'Connector batch size for interview_records manual sync'
        required: false
        default: '10'

jobs:
  sync-people:
    if: github.event_name == 'schedule' && github.event.schedule == '0 2 * * *' || github.event_name == 'workflow_dispatch' && (github.event.inputs.sync_type == 'people' || github.event.inputs.sync_type == 'both')
    runs-on: ubuntu-latest
    timeout-minutes: 360
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync People Data
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "🕐 Starting people sync at $(date)"
          pnpm dlx tsx@4.20.3 scripts/sync-by-type.ts --type people

  sync-visas:
    if: github.event_name == 'schedule' && github.event.schedule == '0 3 * * *' || github.event_name == 'workflow_dispatch' && (github.event.inputs.sync_type == 'visas' || github.event.inputs.sync_type == 'both')
    runs-on: ubuntu-latest
    timeout-minutes: 360
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync Visas Data
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "🕐 Starting visas sync at $(date)"
          pnpm dlx tsx@4.20.3 scripts/sync-by-type.ts --type visas

  sync-interview-records:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.sync_type == 'interview_records'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync Interview Records
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "🕐 Starting interview_records sync at $(date)"
          cmd=(pnpm dlx tsx@4.20.3 scripts/sync-by-type.ts --type interview_records --all-batches)
          if [ -n "${{ github.event.inputs.batch_size }}" ]; then
            cmd+=(--limit "${{ github.event.inputs.batch_size }}")
          fi
          "${cmd[@]}"
